server.port=${PORT:8080}
spring.application.name=finance-tracker
spring.jpa.open-in-view=false
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# PostgreSQL Supabase (Production)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.xupjjjlcnaxhuezxxbqp.supabase.co:5432/postgres}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:your_supabase_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false